<!doctype html>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartzconnect.com/" />
    <meta property="og:title" content="SmartzConnect — Africa's Premier Social Platform" />
    <meta property="og:description" content="Connect. Match. Thrive. Africa's premier social platform connecting people across 195+ countries." />
    <meta property="og:image" content="https://smartzconnect.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@smartzconnect" />
    <meta name="twitter:title" content="SmartzConnect — Africa's Premier Social Platform" />
    <meta name="twitter:description" content="Connect. Match. Thrive. Africa's premier social platform." />
    <meta name="twitter:image" content="https://smartzconnect.com/og-image.jpg" />

    <!-- Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <!-- Native splash shown before React hydrates — removed by React on mount -->
    <div id="native-splash" style="
      position:fixed;inset:0;z-index:9999;
      background:#0D0A14;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:24px;
    ">
      <div style="position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;">
        <svg style="position:absolute;animation:sc-spin 1.4s linear infinite;" width="120" height="120" viewBox="0 0 120 120" fill="none">
          <defs>
            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#EC4899" stop-opacity="0"/>
              <stop offset="40%" stop-color="#EC4899" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#A855F7" stop-opacity="1"/>
            </linearGradient>
          </defs>
          <circle cx="60" cy="60" r="54" stroke="url(#sg)" stroke-width="4" stroke-linecap="round" stroke-dasharray="220 120"/>
        </svg>
        <svg style="position:absolute;animation:sc-spin 2.2s linear infinite reverse;" width="136" height="136" viewBox="0 0 136 136" fill="none">
          <circle cx="68" cy="68" r="62" stroke="#EC489930" stroke-width="2" stroke-linecap="round" stroke-dasharray="60 330"/>
        </svg>
        <img src="/icon-192.png" alt="SmartzConnect" style="width:80px;height:80px;object-fit:contain;border-radius:16px;filter:drop-shadow(0 0 16px rgba(236,72,153,0.45));"/>
      </div>
      <p style="color:#6b7280;font-size:13px;font-family:system-ui,sans-serif;letter-spacing:0.05em;">Loading SmartzConnect…</p>
    </div>
    <style>
      @keyframes sc-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Tawk.to Live Chat Widget -->
    <script type="text/javascript">
      var Tawk_API = Tawk_API || {};
      var Tawk_LoadStart = new Date();
      // Tawk.to's own floating launcher bubble is the ONLY support widget in
      // the app now (the previous custom purple FloatingSupportWidget was
      // removed). Pin it to the same bottom-right resting spot that widget
      // used (20px margin from the corner) as its fallback position, with an
      // explicit high z-index so it always renders above app content.
      Tawk_API.customStyle = {
        zIndex: 2147483000,
        visibility: {
          desktop: { xOffset: 20, yOffset: 20, position: 'br' },
          mobile: { xOffset: 20, yOffset: 20, position: 'br' },
        },
      };
      // Visibility is decided by the same logic React uses (see
      // window.__recomputeTawkVisibility, set by src/lib/tawk.ts): shown only
      // on public-site routes and only if the user hasn't dismissed it this
      // session. Calling the shared function here — instead of unconditionally
      // hiding — avoids a race where this onLoad (fired once Tawk's own script
      // finishes loading over the network) could stomp on a "show" call
      // <TawkController> already made on mount.
      Tawk_API.onLoad = function () {
        if (window.__recomputeTawkVisibility) {
          window.__recomputeTawkVisibility();
        } else if (Tawk_API.hideWidget) {
          Tawk_API.hideWidget();
        }
      };
      (function () {
        var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
        s1.async = true;
        s1.src = 'https://embed.tawk.to/6a5198ebbc94e01d417be3ae/1jt7bqmsj';
        s1.charset = 'UTF-8';
        s1.setAttribute('crossorigin', '*');
        s0.parentNode.insertBefore(s1, s0);
      })();
    </script>
  </body>
</html>
